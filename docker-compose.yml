# Optional: docker-compose nur als Bequemlichkeit für lokales Testen und für
# Setups, die compose nutzen. Auf Unraid trägst du die Werte stattdessen in die
# Container-GUI ein (siehe README + unraid/pocketlog.xml).
#
# MariaDB wird NICHT von diesem Stack betrieben — bringe deinen eigenen
# Container/Server mit und setze DB_HOST in .env entsprechend.

services:
  pocketlog:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: pocketlog:latest
    container_name: pocketlog
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DEV_FAKE_USER: ${DEV_FAKE_USER}
      TZ: ${TZ}
    ports:
      - "8080:8000"   # lokaler Test: http://localhost:8080
    networks:
      - proxy

networks:
  proxy:
    name: ${PROXY_NETWORK}
    external: true
