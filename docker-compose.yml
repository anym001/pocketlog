services:
  mariadb:
    image: mariadb:11
    container_name: pocketlog-mariadb
    profiles: ["", "internal-db"]
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - pocketlog-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: pocketlog-backend
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DEV_FAKE_USER: ${DEV_FAKE_USER}
      TZ: ${TZ}
    depends_on:
      mariadb:
        condition: service_healthy
        required: false
    networks:
      - pocketlog-net
      - proxy

  frontend:
    build: ./frontend
    container_name: pocketlog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"   # lokaler Test ohne SWAG: http://localhost:8080
    networks:
      - pocketlog-net
      - proxy

networks:
  pocketlog-net:
    driver: bridge
  proxy:
    name: ${PROXY_NETWORK}
    external: true
