<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Variante 1 – "Bogen" (verfeinert)
    Kreisbogen als dicker Stroke, Mittelpunkt außerhalb des Icons unten-rechts
    (512,512). Der Bogen schneidet diagonal quer durch die PL-Buchstaben –
    bei x=256 liegt er bei y≈259, genau auf halber Versalhöhe.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0845A"/>
      <stop offset="100%" stop-color="#B84828"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Bogen: Viertelkreis mit Zentrum (512,512), r=360
       – Startpunkt (152,512) am unteren Rand
       – Endpunkt  (512,152) am rechten Rand
       – sweep=0 → kurzer Bogen (90°) durch Icon-Mitte ~(257,257)
       – schneidet durch die Versalhöhe von PL                         -->
  <g clip-path="url(#clip)">
    <path d="M 152 512 A 360 360 0 0 0 512 152"
          fill="none"
          stroke="rgba(255,255,255,0.48)"
          stroke-width="78"
          stroke-linecap="round"/>
  </g>

  <!-- PL – größer, linksbündig, weiß -->
  <text x="68" y="358"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="302"
        letter-spacing="-8"
        fill="white"
        dominant-baseline="alphabetic">PL</text>
</svg>
