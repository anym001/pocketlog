<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    C: Edenred-exakt – solid weißer Kreis, Mittelpunkt außerhalb der Ecke.
    Nur der Randbereich des Kreises ist sichtbar → schmale weiße Fläche
    in der unteren rechten Ecke, wie Edenred's weißes Formelement.
  -->
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E0845A"/>
      <stop offset="100%" stop-color="#B84828"/>
    </linearGradient>
    <clipPath id="iconC">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bgC)"/>
  <!-- Großer weißer Kreis, Mittelpunkt weit außerhalb (680,580), r=420
       → nur Randkappe im unteren rechten Eck sichtbar               -->
  <g clip-path="url(#iconC)">
    <circle cx="680" cy="580" r="420" fill="white" opacity="0.92"/>
  </g>
  <text x="68" y="358"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="302" letter-spacing="-8"
        fill="white" dominant-baseline="alphabetic">PL</text>
</svg>
