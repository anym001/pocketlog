<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Metallic gradient on the letters -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="28%"  stop-color="#E4E4E4"/>
      <stop offset="52%"  stop-color="#ACACAC"/>
      <stop offset="74%"  stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#8A8A8A"/>
    </linearGradient>
    <!-- Subtle inner shadow / bevel filter -->
    <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background: near-black with very slight warm tint -->
  <rect width="512" height="512" rx="114" fill="#1A1A1A"/>

  <!-- Subtle top-edge highlight -->
  <rect width="512" height="512" rx="114" fill="url(#topShine)" opacity="0.06"/>

  <!-- PL – metallic gradient -->
  <text x="256" y="356"
        font-family="Arial Black, Helvetica Neue, sans-serif"
        font-weight="900"
        font-size="272"
        letter-spacing="-10"
        fill="url(#metal)"
        filter="url(#bevel)"
        text-anchor="middle"
        dominant-baseline="alphabetic">PL</text>
</svg>
