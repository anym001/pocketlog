<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8673A"/>
      <stop offset="100%" stop-color="#C04A1E"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bgA)"/>

  <!-- White arc element (bottom-right, like Edenred's swoosh) -->
  <g clip-path="url(#shape)">
    <circle cx="410" cy="360" r="240" fill="white" opacity="0.18"/>
    <circle cx="410" cy="360" r="170" fill="url(#bgA)"/>
  </g>

  <!-- PL – bold, white, slightly offset like Edenred's "Ed" -->
  <text x="96" y="330"
        font-family="Arial Black, Helvetica Neue, sans-serif"
        font-weight="900"
        font-size="290"
        letter-spacing="-8"
        fill="white"
        dominant-baseline="alphabetic">PL</text>
</svg>
