<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Variante 3 – "Hierarchie"
    Typografischer Kontrast: P dominant (groß), L subordiniert (klein).
    Kein geometrisches Element – Wirkung entsteht allein durch Schriftgröße.
    Inspiriert vom Monogramm-Prinzip (wie Edenred E ↔ d).
  -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#B84828"/>
    </linearGradient>
    <!-- Subtile weiße Aufhellung oben-links für Tiefe -->
    <radialGradient id="shine3" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg3)"/>
  <!-- Lichtreflex oben-links -->
  <rect width="512" height="512" rx="114" fill="url(#shine3)"/>

  <!-- P – dominant, groß, linksbündig -->
  <text x="54" y="380"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="340"
        fill="white"
        dominant-baseline="alphabetic">P</text>

  <!-- L – subordiniert, kleiner, an der Basis von P ausgerichtet -->
  <text x="280" y="380"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="185"
        fill="rgba(255,255,255,0.82)"
        dominant-baseline="alphabetic">L</text>
</svg>
