name: Build and publish image

# Triggered two ways:
#   1. Push to main → auto-increment patch (vX.Y.Z → vX.Y.Z+1), tag, build
#   2. Manual tag push (v*) → build that exact version, no new tag created
#      Use this to release a minor/major bump:
#        git tag v0.3.0 && git push origin v0.3.0

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Triggered by a manual tag push — use that tag as-is, skip auto-tag
            NEW_TAG="${GITHUB_REF#refs/tags/}"
            echo "create_tag=false" >> $GITHUB_OUTPUT
          else
            # Triggered by a push to main — auto-increment patch
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              NEW_TAG="v0.1.0"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
              NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            echo "create_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "new_tag=${NEW_TAG}"     >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}"   >> $GITHUB_OUTPUT

      - name: Create git tag
        if: steps.version.outputs.create_tag == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pocketlog
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
