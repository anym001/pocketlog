name: tests

# Runs on every PR for fast feedback, and is reusable (workflow_call) so the
# build/publish workflow gates the image on green tests. Pushes to main are
# covered via that workflow_call (not a push trigger here) to avoid running
# the suite twice on the same commit.
on:
  pull_request:
  workflow_call:

# Least privilege: every job only reads the repo. Callers (build.yml/dev.yml)
# grant their own write scopes on their own jobs, never through this file.
permissions:
  contents: read

jobs:
  lint-backend:
    # Static gate: ruff lint + format check on the backend. Catches style and
    # import regressions before they reach review. No app boot, so it's fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.16
      - name: ruff check
        run: ruff check .
        working-directory: backend
      - name: ruff format --check
        run: ruff format --check .
        working-directory: backend

  lint-frontend:
    # Static gate for the frontend JS: Prettier format check + ESLint. Fast,
    # no browser — the UI flow is covered by the Playwright `smoke` job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: npm install
      - name: prettier --check
        run: npm run format:check
      - name: eslint
        run: npm run lint:js

  unit-frontend:
    # Vitest unit tests for the frontend's pure helpers (frontend/utils.js).
    # Fast, no browser — the full UI flow is covered by the Playwright smoke
    # in the `smoke` job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: npm install
        working-directory: frontend/unit
      - run: npm test
        working-directory: frontend/unit

  test-sqlite:
    # Full pytest suite on the default SQLite backend (also runs all
    # migrations against SQLite via the conftest session fixture).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: python -m pytest -q
        working-directory: backend

  migrations-mariadb:
    # The MariaDB-only upgrade branches (UPDATE…JOIN, REGEXP, CHAR_LENGTH,
    # ON UPDATE CURRENT_TIMESTAMP) never run on the SQLite path, so they'd
    # only ever execute on a fresh MariaDB install by an end user. The test
    # suite hard-pins SQLite (conftest), so validate that exact path here:
    # `alembic upgrade head` from an empty schema against a real MariaDB.
    # (Reversibility/up-down-up is covered on SQLite; downgrades are never a
    # deployment path — the container only ever runs `upgrade head`.)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: pocketlog
          MARIADB_USER: pocketlog
          MARIADB_PASSWORD: pocketlog
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql+pymysql://pocketlog:pocketlog@127.0.0.1:3306/pocketlog?charset=utf8mb4
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - name: Upgrade fresh MariaDB schema to head
        working-directory: backend
        run: alembic upgrade head

  smoke:
    # Build the image and boot it with the SQLite default (no DB envs), as an
    # Unraid user would (PUID/PGID 99:100). Proves the entrypoint chowns
    # /config, drops privileges, and that alembic + uvicorn come up and create
    # the DB file owned by the requested user.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build image
        run: docker build -f backend/Dockerfile -t pocketlog:ci .
      - name: Run container (SQLite default, PUID/PGID 99:100)
        run: |
          mkdir -p cfg
          docker run -d --name pl -p 8000:8000 \
            -e PUID=99 -e PGID=100 \
            -v "$PWD/cfg:/config" \
            pocketlog:ci
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health; then echo " -> healthy"; exit 0; fi
            sleep 2
          done
          echo "health check timed out"; docker logs pl; exit 1
      - name: Assert SQLite DB created and owned by 99:100
        run: |
          test -f cfg/db/pocketlog.db || { echo "DB file missing"; docker logs pl; exit 1; }
          owner=$(stat -c '%u:%g' cfg/db/pocketlog.db)
          echo "DB owner: $owner"
          [ "$owner" = "99:100" ] || { echo "expected 99:100"; exit 1; }
      # Playwright UI smoke against the running image: backend pytest + the
      # health ping above never render the frontend, so a broken view or an
      # untranslated i18n key (the goals.* regression) would pass unnoticed.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install Playwright
        working-directory: frontend/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run UI smoke
        working-directory: frontend/e2e
        env:
          BASE_URL: http://127.0.0.1:8000
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report
          retention-days: 7
      - name: Cleanup
        if: always()
        run: docker rm -f pl || true
