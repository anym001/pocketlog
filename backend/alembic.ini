[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
# Mirror app/logging_config.py _TEXT_FORMAT / _DATE_FORMAT so migration logs
# (a separate `alembic upgrade head` process) match the app's docker-log format.
# Second precision only — no milliseconds.
format = %(asctime)s %(levelname)s %(name)s %(message)s
datefmt = %Y-%m-%d %H:%M:%S
