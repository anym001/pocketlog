## Version 2026/05/13
# PocketLog – Forward Auth via Authentik
#
# Voraussetzungen:
#   - SWAG Container läuft (linuxserver/swag)
#   - Authentik Outpost ist über SWAG erreichbar (proxy-confs/authentik-*.conf)
#   - DNS-Eintrag pocketlog.<deinedomain> zeigt auf SWAG
#   - frontend-Container hängt im PROXY_NETWORK (siehe docker-compose.yml)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name pocketlog.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # Authentik Outpost
    include /config/nginx/authentik-server.conf;

    location / {
        # Forward Auth – Authentik setzt nach erfolgreichem Login die User-Header.
        include /config/nginx/authentik-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app pocketlog-frontend;
        set $upstream_port 80;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Den von Authentik gesetzten Header an den FastAPI-Container weitergeben.
        proxy_set_header X-Authentik-Username $authentik_username;
    }

    location ~ ^/api/(docs|openapi.json) {
        # Swagger UI / OpenAPI nicht über Authentik laufen lassen ist riskant,
        # daher dasselbe Auth-Snippet:
        include /config/nginx/authentik-location.conf;
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app pocketlog-frontend;
        set $upstream_port 80;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
        proxy_set_header X-Authentik-Username $authentik_username;
    }
}
