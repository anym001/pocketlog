## Version 2026/05/14
# PocketLog – Forward Auth via Authentik (Standard-Flow, MFA-fähig)
#
# Voraussetzungen:
#   - SWAG Container läuft (linuxserver/swag)
#   - Authentik Outpost ist über SWAG erreichbar (proxy-confs/authentik-*.conf)
#   - DNS-Eintrag pocketlog.<deinedomain> zeigt auf SWAG
#   - PocketLog-Container hängt im gleichen Docker-Netzwerk wie SWAG
#   - AUTH_SECRET ist sowohl unten im proxy_set_header als auch als
#     ENV-Variable im PocketLog-Container gesetzt (identischer Wert).
#     Erzeugen z.B. mit:  openssl rand -hex 32

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name pocketlog.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    # Authentik Outpost (stellt /outpost.goauthentik.io/* bereit)
    include /config/nginx/authentik-server.conf;

    location / {
        # Authentik Forward Auth – Redirect zur Login-Seite (inkl. MFA),
        # setzt nach erfolgreicher Session den X-Authentik-Username Header.
        include /config/nginx/authentik-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        # Eventuelle Authorization-Header nicht durchreichen.
        proxy_set_header Authorization "";

        set $upstream_app pocketlog;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Den von Authentik gesetzten Header an FastAPI durchreichen.
        proxy_set_header X-Authentik-Username $authentik_username;

        # Shared Secret zwischen SWAG und Backend – schützt gegen Direkt-
        # zugriffe auf Port 8000 mit gefälschtem X-Authentik-Username-Header.
        # Identischen Wert als AUTH_SECRET-ENV im PocketLog-Container setzen.
        proxy_set_header X-Auth-Secret "ERSETZE-MICH-DURCH-OPENSSL-RAND-HEX-32";
    }
}
