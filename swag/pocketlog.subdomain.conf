## Version 2026/05/21
# PocketLog – Forward Auth via Authentik (standard flow, MFA-capable)
#
# Prerequisites:
#   - SWAG container is running (linuxserver/swag)
#   - Authentik outpost is reachable via SWAG (authentik-server.conf in /config/nginx/)
#   - DNS record pocketlog.<yourdomain> points to SWAG
#   - PocketLog container is on the same Docker network as SWAG
#   - AUTH_SECRET must be set both in the proxy_set_header below and as an
#     ENV variable in the PocketLog container (identical value).
#     Generate with:  openssl rand -hex 32
#
# Includes used from /config/nginx/ (see this repo's swag/ directory for the
# matching reference copies):
#   - ssl.conf            TLS + global security headers (HSTS, XFO, nosniff, …)
#   - geoblock.conf       allow LAN + whitelisted countries, return 404 otherwise
#   - errors.conf         custom branded error pages
#   - authentik-server.conf, authentik-location.conf   forward auth + MFA
#   - internal.conf       hard LAN-only allowlist on top of geoblock
#   - proxy.conf, resolver.conf   standard SWAG proxy headers and DNS

server {
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;

    server_name pocketlog.*;

    include /config/nginx/ssl.conf;
    include /config/nginx/geoblock.conf;
    include /config/nginx/errors.conf;

    client_max_body_size 0;

    # Authentik outpost mount (/outpost.goauthentik.io/*)
    include /config/nginx/authentik-server.conf;

    location / {
        # Authentik forward auth – redirects to login page (incl. MFA),
        # sets X-Authentik-Username header after successful session.
        include /config/nginx/authentik-location.conf;

        include /config/nginx/internal.conf;
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        # Do not forward any Authorization header.
        proxy_set_header Authorization "";

        set $upstream_app pocketlog;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Forward the header set by Authentik to FastAPI.
        proxy_set_header X-Authentik-Username $authentik_username;

        # Shared secret between SWAG and the backend – guards against direct
        # access to port 8000 with a forged X-Authentik-Username header.
        # Set the same value as AUTH_SECRET ENV in the PocketLog container.
        proxy_set_header X-Auth-Secret "REPLACE-ME-WITH-OPENSSL-RAND-HEX-32";
    }
}
