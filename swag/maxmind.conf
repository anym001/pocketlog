geoip2 /config/geoip2db/GeoLite2-City.mmdb {
    auto_reload 1w;
    $geoip2_data_city_name   city names en;
    $geoip2_data_postal_code postal code;
    $geoip2_data_latitude    location latitude;
    $geoip2_data_longitude   location longitude;
    $geoip2_data_state_name  subdivisions 0 names en;
    $geoip2_data_state_code  subdivisions 0 iso_code;
    $geoip2_data_continent_code   continent code;
    $geoip2_data_country_iso_code country iso_code;
}

# Country Codes: https://en.wikipedia.org/wiki/ISO_3166-2

map $geoip2_data_country_iso_code $geo-whitelist {
    default no; # Länder sind gleichgesetzt mit jenen in der Firewall
    AT yes; # Österreich
    CH yes; # Schweiz
    CZ yes; # Tschechien
    DE yes; # Deutschland
    ES yes; # Spanien
    FR yes; # Frankreich
    GR yes; # Griechenland
    HR yes; # Kroatien
    HU yes; # Ungarn
    IT yes; # Italien
    PT yes; # Portugal
    SI yes; # Slowenien
    SK yes; # Slowakei
    TR yes; # Türkei
}

map $geoip2_data_country_iso_code $geo-blacklist {
    default yes;
    # Example for blacklisting a country, uncomment the blacklisted country below
    # UK no;
 }

geo $lan-ip {
    default no;
    10.0.0.0/8 yes;
    172.16.0.0/12 yes;
    192.168.0.0/16 yes;
    100.64.0.0/10 yes; # Adressbereich für Carrier Grade NAT
    fc00::/8 yes;
    fd00::/8 yes;
    fe80::/10 yes;
}
